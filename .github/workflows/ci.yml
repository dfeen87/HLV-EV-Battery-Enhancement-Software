name: CI

on:
  push:
  pull_request:

jobs:
  build-test:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up C++ toolchain
        run: |
          c++ --version
          cmake --version

      - name: Install dependencies
        run: echo "No external dependencies to install."

      - name: Build simulation smoke test
        run: |
          cmake -B build
          cmake --build build

      - name: Run simulation smoke test
        run: ./build/basic_integration
